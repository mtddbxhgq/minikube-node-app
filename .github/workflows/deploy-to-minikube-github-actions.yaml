name: Deploy to Minikube using GitHub Actions

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start Minikube
        uses: medyagh/setup-minikube@master

      - name: Check Kubernetes cluster
        run: |
          kubectl get nodes
          kubectl get pods -A

      - name: Build Docker image inside Minikube
        run: |
          export SHELL=/bin/bash
          eval "$(minikube -p minikube docker-env)"
          docker build -t devopshint/node-app:latest .
          docker images

      - name: Deploy application to Minikube
        run: |
          kubectl apply -f k8s-node-app.yaml

      - name: Wait for application
        run: |
          kubectl rollout status deployment/nodejs-app --timeout=120s
          kubectl wait \
            --for=condition=ready pod \
            -l app=nodejs-app \
            --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get deployments
          kubectl get pods -o wide
          kubectl get services

      - name: Show service URL
        run: |
          minikube service list
          minikube service nodejs-app --url || true
